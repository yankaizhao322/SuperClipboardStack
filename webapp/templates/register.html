{% extends "base.html" %}
{% block title %}注册 | 超级粘贴板 Web{% endblock %}
{% block content %}
<section class="card auth-card">
  <h2>注册账号</h2>
  <form method="post" class="form-grid">
    <label>用户名
      <input name="username" type="text" minlength="3" required />
    </label>
    <label>密码
      <input name="password" type="password" minlength="6" required />
    </label>
    <button type="submit" class="btn">注册并进入</button>
  </form>
  <p class="hint">已有账号？<a href="{{ url_for('login') }}">去登录</a></p>
</section>
{% endblock %}
